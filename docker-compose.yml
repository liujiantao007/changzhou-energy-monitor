version: '3.8'

services:
  energy-monitor:
    image: changzhou-energy-monitor:latest
    container_name: energy-monitor-prod
    restart: always
    ports:
      - "65080:80"
      - "5000:5000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - TZ=Asia/Shanghai
    networks:
      - energy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  energy-network:
    driver: bridge
