[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/var/log/nginx/nginx-access.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/nginx/nginx-error.log
stderr_logfile_maxbytes=10MB
priority=10

[program:gunicorn]
command=/usr/local/bin/gunicorn --bind 127.0.0.1:5000 --workers 2 --threads 4 --access-logfile /var/log/gunicorn/access.log --error-logfile /var/log/gunicorn/error.log --log-level info app:app
directory=/app
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/dev/null
stderr_logfile=/var/log/gunicorn/gunicorn-error.log
stderr_logfile_maxbytes=10MB
environment=DB_HOST="%(ENV_DB_HOST)s",DB_PORT="%(ENV_DB_PORT)s",DB_USER="%(ENV_DB_USER)s",DB_PASSWORD="%(ENV_DB_PASSWORD)s",DB_NAME="%(ENV_DB_NAME)s"
priority=20

[eventlistener:process_exit]
command=bash -c "echo 'Process exited'"
events=PROCESS_STATE_EXITED
buffer_size=100
