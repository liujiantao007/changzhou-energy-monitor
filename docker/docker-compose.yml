version: '3.8'

services:
  backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
    container_name: energy-backend
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST:-10.38.78.217}
      - DB_PORT=${DB_PORT:-3220}
      - DB_USER=${DB_USER:-liujiantao}
      - DB_PASSWORD=${DB_PASSWORD:-Liujt!@#}
      - DB_NAME=${DB_NAME:-energy_management_2026}
      - FLASK_ENV=${FLASK_ENV:-production}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-4}
    networks:
      - energy-network
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/data')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: false

  frontend:
    build:
      context: ../..
      dockerfile: docker/frontend/Dockerfile
    container_name: energy-frontend
    restart: unless-stopped
    networks:
      - energy-network
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

networks:
  energy-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  logs:
    driver: local
