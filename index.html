<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常州能耗云运营驾驶舱</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- ECharts库 - 本地版本（内网部署） -->
    <script src="js/libs/echarts.min.js"></script>
    <!-- SheetJS库 - 本地版本（内网部署） -->
    <script src="js/libs/xlsx.full.min.js"></script>
    <!-- 导航配置文件 -->
    <script src="js/nav-config.js"></script>
</head>
<body>
    <div id="app">
        <!-- 顶部导航栏 -->
        <header class="navbar">
            <div class="navbar-brand">常州能耗运营驾驶舱</div>
            <nav class="navbar-nav">
                <a href="#home" class="nav-item active">首页</a>
                <a href="#报账管理" class="nav-item">报账管理</a>
                <a href="#电表管理" class="nav-item">电表管理</a>
                <a href="#能耗分析" class="nav-item">能耗分析</a>
                <a href="#报表管理" class="nav-item">报表管理</a>
            </nav>
            <div class="navbar-placeholder"></div>
        </header>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 首页内容 -->
            <div id="home" class="page active">
                <!-- 三栏布局 -->
                <div class="grid-container">
                    <!-- 左侧栏 -->
                    <div class="column column-left">
                        <!-- 能耗总览模块 -->
                        <div class="module">
                            <h3>能耗总览</h3>
                            <div class="time-selector">
                                <button class="time-btn">年</button>
                                <button class="time-btn">月</button>
                                <button class="time-btn active">日</button>
                            </div>
                            <div class="metrics">
                                <div class="metric-item">
                                    <span class="metric-label">总体能耗</span>
                                    <div class="metric-value-wrapper">
                                        <span class="metric-value" id="total-energy">0</span><span class="metric-unit">kWh</span>
                                    </div>
                                    <span class="metric-change" id="energy-change">+0%</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label">总体电费</span>
                                    <div class="metric-value-wrapper">
                                        <span class="metric-value" id="total-cost-display">0</span><span class="metric-unit">元</span>
                                    </div>
                                    <span class="metric-change" id="cost-change">+0%</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label">POI 总数</span>
                                    <div class="metric-value-wrapper">
                                        <span class="metric-value" id="total-poi">0</span><span class="metric-unit">个</span>
                                    </div>
                                    <span class="metric-change" id="poi-change">+0%</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label">设备总数</span>
                                    <div class="metric-value-wrapper">
                                        <span class="metric-value" id="total-device">0</span><span class="metric-unit">个</span>
                                    </div>
                                    <span class="metric-change" id="device-change">+0%</span>
                                </div>
                            </div>
                        </div>

                        <!-- 用电方分类统计模块 -->
                        <div class="module">
                            <h3>能耗分项统计</h3>
                            <div class="time-selector" id="consumer-type-time-selector">
                                <button class="time-btn">年</button>
                                <button class="time-btn">月</button>
                                <button class="time-btn active">日</button>
                            </div>
                            <div id="consumer-type-chart" class="chart"></div>
                        </div>

                        <!-- POI分项统计模块 -->
                        <div class="module">
                            <h3>POI分项统计</h3>
                            <div class="time-selector" id="poi-time-selector">
                                <button class="time-btn">年</button>
                                <button class="time-btn">月</button>
                                <button class="time-btn active">日</button>
                            </div>
                            <div id="poi-chart" class="chart"></div>
                        </div>
                    </div>
                    
                    <!-- 中间栏 -->
                    <div class="column column-center">
                        <!-- 核心地图模块 -->
                        <div class="module">
                            <h3>常州能耗分布</h3>
                            <div class="region-selector">
                                <select id="district-select" class="region-select">
                                    <option value="">选择区县</option>
                                </select>
                                <select id="grid-select" class="region-select" disabled>
                                    <option value="">选择网格</option>
                                </select>
                            </div>
                            <div id="map-chart" class="chart map-chart"></div>
                        </div>
                        
                        <!-- 统计图表区域 -->
                        <div class="chart-row">
                            <div class="module">
                                <h3>用电类型统计</h3>
                                <div class="time-selector" id="electricity-type-time-selector">
                                    <button class="time-btn">年</button>
                                    <button class="time-btn">月</button>
                                    <button class="time-btn active">日</button>
                                </div>
                                <div id="electricity-type-chart" class="chart"></div>
                            </div>
                            <div class="module">
                                <h3>能耗趋势图</h3>
                                <div class="time-selector" id="trend-time-selector">
                                    <button class="time-btn">年</button>
                                    <button class="time-btn">月</button>
                                    <button class="time-btn active">日</button>
                                </div>
                                <div id="energy-trend-chart" class="chart"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 右侧栏 -->
                    <div class="column column-right">
                        <!-- 报账总览模块 -->
                        <div class="module">
                            <h3>报账总览</h3>
                            <div class="time-selector">
                                <button class="time-btn">年</button>
                                <button class="time-btn">月</button>
                                <button class="time-btn active">日</button>
                            </div>
                            <div class="report-metrics">
                                <div class="report-item">
                                    <span class="report-label">租费</span>
                                    <div class="report-stats">
                                        <span class="report-total">总报账数: <span id="rent-total">0</span></span>
                                        <span class="report-pending">待报账: <span id="rent-pending">0</span></span>
                                        <span class="report-completed">已报账: <span id="rent-completed">0</span></span>
                                        <div class="progress-bar">
                                            <div class="progress" id="rent-progress"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="report-item">
                                    <span class="report-label">电费</span>
                                    <div class="report-stats">
                                        <span class="report-total">总报账数: <span id="electricity-total">0</span></span>
                                        <span class="report-pending">待报账: <span id="electricity-pending">0</span></span>
                                        <span class="report-completed">已报账: <span id="electricity-completed">0</span></span>
                                        <div class="progress-bar">
                                            <div class="progress" id="electricity-progress"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 告警总览模块 -->
                        <div class="module">
                            <h3>告警总览</h3>
                            <div class="refresh-btn" id="alarm-refresh">刷新</div>
                            <div class="alarm-list" id="alarm-list">
                                <!-- 告警信息将通过JavaScript动态生成 -->
                            </div>
                        </div>
                        
                        <!-- 事件总览模块 -->
                        <div class="module">
                            <h3>事件总览</h3>
                            <div class="refresh-btn" id="event-refresh">刷新</div>
                            <div class="event-list" id="event-list">
                                <!-- 事件信息将通过JavaScript动态生成 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 其他页面的空白占位 -->
            <div id="报账管理" class="page">
                <div class="iframe-container">
                    <div class="iframe-loading">
                        <div class="spinner"></div>
                        <span>报账管理加载中...</span>
                    </div>
                    <iframe id="baozhang-frame" src="" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
                </div>
            </div>

            <div id="电表管理" class="page">
                <div class="iframe-container">
                    <div class="iframe-loading">
                        <div class="spinner"></div>
                        <span>电表管理加载中...</span>
                    </div>
                    <iframe id="dianbiao-frame" src="" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
                </div>
            </div>

            <div id="能耗分析" class="page">
                <div id="energy-iframe-container" style="position: relative; width: 100%; height: 100%;">
                    <div id="energy-iframe-loading" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;">
                        <div style="width: 50px; height: 50px; border: 5px solid #e0e0e0; border-top-color: #1890ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
                        <p style="color: #666; font-size: 16px;">能耗分析平台加载中...</p>
                    </div>
                    <iframe id="energy-analysis-frame" src="" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
                </div>
            </div>

            <div id="报表管理" class="page">
                <div class="iframe-container">
                    <div class="iframe-loading">
                        <div class="spinner"></div>
                        <span>报表管理加载中...</span>
                    </div>
                    <iframe id="baobiao-frame" src="" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 数据加载状态 -->
    <div id="loading" class="loading">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p>数据加载中...</p>
        </div>
    </div>

    <script src="js/data.js?v=20260401c"></script>
    <script src="js/app.js?v=20260401c"></script>
    <script src="js/charts.js?v=20260401c"></script>
    <script src="js/map.js?v=20260401c"></script>
</body>
</html>
